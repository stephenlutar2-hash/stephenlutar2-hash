<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>
  <rect width="800" height="100" rx="5" fill="url(#bg)"/>
  <rect width="800" height="100" rx="5" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.2" fill="none"/>

  <text x="400" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.6" letter-spacing="2">STACK</text>

  <!-- Row 1: Languages -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#8ba3b8">
    <rect x="20" y="28" width="88" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="64" y="42" text-anchor="middle" fill="#00d4ff">TypeScript</text>

    <rect x="116" y="28" width="66" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="149" y="42" text-anchor="middle" fill="#4a90d9">Python</text>

    <rect x="190" y="28" width="58" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="219" y="42" text-anchor="middle" fill="#805AD5">Lean 4</text>

    <rect x="256" y="28" width="48" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="280" y="42" text-anchor="middle">Bash</text>

    <rect x="312" y="28" width="68" height="20" rx="3" fill="#2DA44E" fill-opacity="0.1" stroke="#2DA44E" stroke-width="0.4" stroke-opacity="0.4"/>
    <text x="346" y="42" text-anchor="middle" fill="#2DA44E">Node 24</text>

    <rect x="388" y="28" width="54" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="415" y="42" text-anchor="middle">Vitest</text>

    <rect x="450" y="28" width="78" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="489" y="42" text-anchor="middle">PostgreSQL</text>

    <rect x="536" y="28" width="52" height="20" rx="3" fill="#01696F" fill-opacity="0.15" stroke="#01696F" stroke-width="0.4" stroke-opacity="0.4"/>
    <text x="562" y="42" text-anchor="middle" fill="#00d4ff">Zenodo</text>

    <rect x="596" y="28" width="64" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="628" y="42" text-anchor="middle">Sigstore</text>

    <rect x="668" y="28" width="112" height="20" rx="3" fill="#00d4ff" fill-opacity="0.07" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.3"/>
    <text x="724" y="42" text-anchor="middle">OpenTelemetry</text>
  </g>

  <!-- Row 2: principles -->
  <text x="20" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#3a5a70">SHA-pinned actions · harden-runner egress · cosign-signed releases · SBOM every build · OpenSSF Scorecard · Lean kernel-verified</text>
