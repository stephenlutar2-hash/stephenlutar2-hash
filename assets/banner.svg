<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#teal)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="278" width="900" height="2" fill="url(#teal2)"/>

  <!-- Left accent block -->
  <rect x="48" y="72" width="3" height="136" fill="#00d4ff" opacity="0.8" filter="url(#subtle)"/>

  <!-- Lambda symbol -->
  <text x="80" y="120" font-family="Georgia, serif" font-size="72" fill="#00d4ff" opacity="0.12" font-weight="bold">Λ</text>

  <!-- Main name -->
  <text x="80" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700" fill="#f0f4f8" letter-spacing="1" filter="url(#subtle)">Stephen P. Lutar Jr.</text>

  <!-- Role line -->
  <text x="82" y="152" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#00d4ff" letter-spacing="2" opacity="0.9">FOUNDER &amp; CEO · SZL HOLDINGS</text>

  <!-- Divider -->
  <rect x="80" y="166" width="340" height="1" fill="#00d4ff" opacity="0.3"/>

  <!-- Tagline -->
  <text x="82" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8ba3b8" letter-spacing="0.5">Governed decision intelligence · auditable by construction</text>

  <!-- Stats row -->
  <text x="82" y="224" font-family="'Courier New', monospace" font-size="11" fill="#4a7a8a" letter-spacing="0.3">v18.0 · 30 GREEN modules · 76 theorems · 134 lake-verified · 19 HF Spaces · 7 DOIs</text>

  <!-- ORCID badge area -->
  <rect x="80" y="240" width="220" height="22" rx="3" fill="#00d4ff" opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="92" y="255" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" opacity="0.7">ORCID 0009-0001-0110-4173</text>

  <!-- Right side: circuit-like decoration -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="1" fill="none">
    <circle cx="680" cy="140" r="60"/>
    <circle cx="680" cy="140" r="40"/>
    <circle cx="680" cy="140" r="20"/>
    <line x1="680" y1="80" x2="680" y2="200"/>
    <line x1="620" y1="140" x2="740" y2="140"/>
    <line x1="637" y1="97" x2="723" y2="183"/>
    <line x1="637" y1="183" x2="723" y2="97"/>
  </g>
  <circle cx="680" cy="140" r="5" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>

  <!-- Subtle Λ watermark right -->
  <text x="800" y="190" font-family="Georgia, serif" font-size="120" fill="#00d4ff" opacity="0.04" font-weight="bold">Λ</text>
</svg>
