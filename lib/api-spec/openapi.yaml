openapi: 3.1.0
info:
  title: SZL Holdings API
  version: 1.0.0
  description: Unified API for SZL Holdings platforms - Beacon, Nimbus, Zeus, INCA AI, Dream Era
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: beacon
    description: Beacon decision dashboard operations
  - name: nimbus
    description: Nimbus predictive AI operations
  - name: zeus
    description: Zeus modular core operations
  - name: inca
    description: INCA AI innovation engine operations
  - name: dreamera
    description: Dream Era media platform operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- BEACON ----
  /beacon/metrics:
    get:
      operationId: listBeaconMetrics
      tags: [beacon]
      summary: List all KPI metrics
      responses:
        "200":
          description: List of metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeaconMetric"
    post:
      operationId: createBeaconMetric
      tags: [beacon]
      summary: Create a new metric
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeaconMetric"
      responses:
        "201":
          description: Created metric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeaconMetric"

  /beacon/metrics/{id}:
    put:
      operationId: updateBeaconMetric
      tags: [beacon]
      summary: Update a metric
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeaconMetric"
      responses:
        "200":
          description: Updated metric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeaconMetric"
    delete:
      operationId: deleteBeaconMetric
      tags: [beacon]
      summary: Delete a metric
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /beacon/projects:
    get:
      operationId: listBeaconProjects
      tags: [beacon]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeaconProject"
    post:
      operationId: createBeaconProject
      tags: [beacon]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeaconProject"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeaconProject"

  /beacon/projects/{id}:
    put:
      operationId: updateBeaconProject
      tags: [beacon]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeaconProject"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeaconProject"
    delete:
      operationId: deleteBeaconProject
      tags: [beacon]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- NIMBUS ----
  /nimbus/predictions:
    get:
      operationId: listNimbusPredictions
      tags: [nimbus]
      summary: List AI predictions
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NimbusPrediction"
    post:
      operationId: createNimbusPrediction
      tags: [nimbus]
      summary: Create a prediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNimbusPrediction"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NimbusPrediction"

  /nimbus/predictions/{id}:
    delete:
      operationId: deleteNimbusPrediction
      tags: [nimbus]
      summary: Delete a prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /nimbus/alerts:
    get:
      operationId: listNimbusAlerts
      tags: [nimbus]
      summary: List AI alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NimbusAlert"
    post:
      operationId: createNimbusAlert
      tags: [nimbus]
      summary: Create an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNimbusAlert"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NimbusAlert"

  /nimbus/alerts/{id}:
    delete:
      operationId: deleteNimbusAlert
      tags: [nimbus]
      summary: Delete an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- ZEUS ----
  /zeus/modules:
    get:
      operationId: listZeusModules
      tags: [zeus]
      summary: List system modules
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZeusModule"
    post:
      operationId: createZeusModule
      tags: [zeus]
      summary: Create a module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZeusModule"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZeusModule"

  /zeus/modules/{id}:
    put:
      operationId: updateZeusModule
      tags: [zeus]
      summary: Update a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZeusModule"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZeusModule"
    delete:
      operationId: deleteZeusModule
      tags: [zeus]
      summary: Delete a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /zeus/logs:
    get:
      operationId: listZeusLogs
      tags: [zeus]
      summary: List system logs
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZeusLog"
    post:
      operationId: createZeusLog
      tags: [zeus]
      summary: Create a log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZeusLog"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZeusLog"

  # ---- INCA AI ----
  /inca/projects:
    get:
      operationId: listIncaProjects
      tags: [inca]
      summary: List INCA AI projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncaProject"
    post:
      operationId: createIncaProject
      tags: [inca]
      summary: Create an INCA AI project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncaProject"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncaProject"

  /inca/projects/{id}:
    put:
      operationId: updateIncaProject
      tags: [inca]
      summary: Update an INCA AI project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncaProject"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncaProject"
    delete:
      operationId: deleteIncaProject
      tags: [inca]
      summary: Delete an INCA AI project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inca/experiments:
    get:
      operationId: listIncaExperiments
      tags: [inca]
      summary: List INCA AI experiments
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncaExperiment"
    post:
      operationId: createIncaExperiment
      tags: [inca]
      summary: Create an experiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncaExperiment"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncaExperiment"

  # ---- DREAM ERA ----
  /dreamera/content:
    get:
      operationId: listDreameraContent
      tags: [dreamera]
      summary: List Dream Era content
      responses:
        "200":
          description: List of content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DreameraContent"
    post:
      operationId: createDreameraContent
      tags: [dreamera]
      summary: Create content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDreameraContent"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DreameraContent"

  /dreamera/content/{id}:
    put:
      operationId: updateDreameraContent
      tags: [dreamera]
      summary: Update content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDreameraContent"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DreameraContent"
    delete:
      operationId: deleteDreameraContent
      tags: [dreamera]
      summary: Delete content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dreamera/campaigns:
    get:
      operationId: listDreameraCampaigns
      tags: [dreamera]
      summary: List campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DreameraCampaign"
    post:
      operationId: createDreameraCampaign
      tags: [dreamera]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDreameraCampaign"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DreameraCampaign"

  /dreamera/campaigns/{id}:
    delete:
      operationId: deleteDreameraCampaign
      tags: [dreamera]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Beacon
    BeaconMetric:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: number
        unit:
          type: string
        change:
          type: number
        category:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, value, unit, change, category, createdAt]

    CreateBeaconMetric:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        unit:
          type: string
        change:
          type: number
        category:
          type: string
      required: [name, value, unit, change, category]

    BeaconProject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, building, planning, paused]
        progress:
          type: integer
        platform:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, status, progress, platform, createdAt]

    CreateBeaconProject:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, building, planning, paused]
        progress:
          type: integer
        platform:
          type: string
      required: [name, description, status, progress, platform]

    # Nimbus
    NimbusPrediction:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        confidence:
          type: number
        category:
          type: string
        outcome:
          type: string
        timeframe:
          type: string
        status:
          type: string
          enum: [pending, confirmed, refuted]
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, confidence, category, outcome, timeframe, status, createdAt]

    CreateNimbusPrediction:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        confidence:
          type: number
        category:
          type: string
        outcome:
          type: string
        timeframe:
          type: string
        status:
          type: string
          enum: [pending, confirmed, refuted]
      required: [title, description, confidence, category, outcome, timeframe, status]

    NimbusAlert:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        category:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, title, message, severity, category, isRead, createdAt]

    CreateNimbusAlert:
      type: object
      properties:
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        category:
          type: string
        isRead:
          type: boolean
      required: [title, message, severity, category, isRead]

    # Zeus
    ZeusModule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [active, inactive, error, updating]
        category:
          type: string
        uptime:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, version, status, category, uptime, createdAt]

    CreateZeusModule:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [active, inactive, error, updating]
        category:
          type: string
        uptime:
          type: number
      required: [name, description, version, status, category, uptime]

    ZeusLog:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
          enum: [info, warn, error, debug]
        message:
          type: string
        module:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, level, message, module, createdAt]

    CreateZeusLog:
      type: object
      properties:
        level:
          type: string
          enum: [info, warn, error, debug]
        message:
          type: string
        module:
          type: string
      required: [level, message, module]

    # INCA AI
    IncaProject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [research, development, testing, deployed, archived]
        aiModel:
          type: string
        accuracy:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, status, aiModel, accuracy, createdAt]

    CreateIncaProject:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [research, development, testing, deployed, archived]
        aiModel:
          type: string
        accuracy:
          type: number
      required: [name, description, status, aiModel, accuracy]

    IncaExperiment:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        name:
          type: string
        hypothesis:
          type: string
        result:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        accuracy:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, name, hypothesis, result, status, accuracy, createdAt]

    CreateIncaExperiment:
      type: object
      properties:
        projectId:
          type: integer
        name:
          type: string
        hypothesis:
          type: string
        result:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        accuracy:
          type: number
      required: [projectId, name, hypothesis, result, status, accuracy]

    # Dream Era
    DreameraContent:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [article, video, podcast, social, campaign]
        status:
          type: string
          enum: [draft, review, published, archived]
        views:
          type: integer
        engagement:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, title, body, type, status, views, engagement, createdAt]

    CreateDreameraContent:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [article, video, podcast, social, campaign]
        status:
          type: string
          enum: [draft, review, published, archived]
        views:
          type: integer
        engagement:
          type: number
      required: [title, body, type, status, views, engagement]

    DreameraCampaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planning, active, paused, completed]
        budget:
          type: number
        reach:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, status, budget, reach, startDate, endDate, createdAt]

    CreateDreameraCampaign:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planning, active, paused, completed]
        budget:
          type: number
        reach:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
      required: [name, description, status, budget, reach, startDate, endDate]
