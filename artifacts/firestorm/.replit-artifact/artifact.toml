kind = "web"
previewPath = "/firestorm/"
title = "Firestorm Security Lab"
version = "1.0.0"
id = "artifacts/firestorm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/firestorm/" ]
localPort = 25008

[services.development]
run = "pnpm --filter @workspace/firestorm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/firestorm", "run", "build" ]
publicDir = "artifacts/firestorm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25008"
BASE_PATH = "/firestorm/"
