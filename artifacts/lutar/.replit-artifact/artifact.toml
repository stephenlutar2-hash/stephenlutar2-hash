kind = "web"
previewPath = "/lutar/"
title = "Lutar"
version = "1.0.0"
id = "artifacts/lutar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lutar/" ]
localPort = 23146

[services.development]
run = "pnpm --filter @workspace/lutar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lutar", "run", "build" ]
publicDir = "artifacts/lutar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23146"
BASE_PATH = "/lutar/"
