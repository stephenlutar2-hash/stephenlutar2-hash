kind = "web"
previewPath = "/readiness-report/"
title = "Readiness Report"
version = "1.0.0"
id = "artifacts/readiness-report"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/readiness-report/" ]
localPort = 25012

[services.development]
run = "pnpm --filter @workspace/readiness-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/readiness-report", "run", "build" ]
publicDir = "artifacts/readiness-report/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25012"
BASE_PATH = "/readiness-report/"
