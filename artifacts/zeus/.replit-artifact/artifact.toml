kind = "web"
previewPath = "/zeus/"
title = "Zeus Architecture"
version = "1.0.0"
id = "artifacts/zeus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/zeus/" ]
localPort = 25014

[services.development]
run = "pnpm --filter @workspace/zeus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zeus", "run", "build" ]
publicDir = "artifacts/zeus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25014"
BASE_PATH = "/zeus/"
