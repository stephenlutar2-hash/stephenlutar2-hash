kind = "web"
previewPath = "/rosie/"
title = "ROSIE Cybersecurity"
version = "1.0.0"
id = "artifacts/rosie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rosie/" ]
localPort = 25013

[services.development]
run = "pnpm --filter @workspace/rosie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rosie", "run", "build" ]
publicDir = "artifacts/rosie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25013"
BASE_PATH = "/rosie/"
