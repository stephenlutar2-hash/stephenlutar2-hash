kind = "web"
previewPath = "/apps-showcase/"
title = "Apps Showcase"
version = "1.0.0"
id = "artifacts/apps-showcase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/apps-showcase/" ]
localPort = 25003

[services.development]
run = "pnpm --filter @workspace/apps-showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apps-showcase", "run", "build" ]
publicDir = "artifacts/apps-showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25003"
BASE_PATH = "/apps-showcase/"
