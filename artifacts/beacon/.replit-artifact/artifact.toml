kind = "web"
previewPath = "/beacon/"
title = "Beacon"
version = "1.0.0"
id = "artifacts/beacon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/beacon/" ]
localPort = 18245

[services.development]
run = "pnpm --filter @workspace/beacon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beacon", "run", "build" ]
publicDir = "artifacts/beacon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18245"
BASE_PATH = "/beacon/"
