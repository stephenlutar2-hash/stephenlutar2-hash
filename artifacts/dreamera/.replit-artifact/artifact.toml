kind = "web"
previewPath = "/dreamera/"
title = "DreamEra Creative"
version = "1.0.0"
id = "artifacts/dreamera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dreamera/" ]
localPort = 25006

[services.development]
run = "pnpm --filter @workspace/dreamera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreamera", "run", "build" ]
publicDir = "artifacts/dreamera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25006"
BASE_PATH = "/dreamera/"
