kind = "web"
previewPath = "/dreamscape/"
title = "Dreamscape Creative Systems"
version = "1.0.0"
id = "artifacts/dreamscape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dreamscape/" ]
localPort = 25007

[services.development]
run = "pnpm --filter @workspace/dreamscape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreamscape", "run", "build" ]
publicDir = "artifacts/dreamscape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25007"
BASE_PATH = "/dreamscape/"
