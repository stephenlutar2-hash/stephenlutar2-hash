kind = "web"
previewPath = "/career/"
title = "Career Portfolio"
version = "1.0.0"
id = "artifacts/career"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/career/" ]
localPort = 25005

[services.development]
run = "pnpm --filter @workspace/career run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career", "run", "build" ]
publicDir = "artifacts/career/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25005"
BASE_PATH = "/career/"
