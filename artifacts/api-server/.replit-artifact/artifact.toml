kind = "api"
previewPath = "/"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 3000
name = "API Server"
paths = ["/", "/api", "/health", "/aegis", "/beacon", "/lutar", "/nimbus", "/firestorm", "/dreamera", "/dreamscape", "/zeus", "/apps-showcase", "/readiness-report", "/career", "/lyte", "/alloyscape", "/carlota-jo", "/vessels"]

[services.development]
run = "pnpm -w run build:frontends && pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["pnpm", "run", "build"]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/health"
