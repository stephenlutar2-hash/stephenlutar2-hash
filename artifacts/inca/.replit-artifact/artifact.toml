kind = "web"
previewPath = "/inca/"
title = "INCA Intelligence Platform"
version = "1.0.0"
id = "artifacts/inca"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/inca/" ]
localPort = 24481

[services.development]
run = "pnpm --filter @workspace/inca run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inca", "run", "build" ]
publicDir = "artifacts/inca/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24481"
BASE_PATH = "/inca/"
