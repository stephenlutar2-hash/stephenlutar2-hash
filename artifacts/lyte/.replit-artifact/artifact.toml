kind = "web"
previewPath = "/lyte/"
title = "Lyte Observability"
version = "1.0.0"
id = "artifacts/lyte"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lyte/" ]
localPort = 25010

[services.development]
run = "pnpm --filter @workspace/lyte run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lyte", "run", "build" ]
publicDir = "artifacts/lyte/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25010"
BASE_PATH = "/lyte/"
