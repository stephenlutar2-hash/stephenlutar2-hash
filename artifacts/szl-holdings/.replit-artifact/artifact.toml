kind = "web"
previewPath = "/szl-holdings/"
title = "SZL Holdings"
version = "1.0.0"
id = "artifacts/szl-holdings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/szl-holdings/" ]
localPort = 24490

[services.development]
run = "pnpm --filter @workspace/szl-holdings run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/szl-holdings", "run", "build" ]
publicDir = "artifacts/szl-holdings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24490"
BASE_PATH = "/szl-holdings/"
