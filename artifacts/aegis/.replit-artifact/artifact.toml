kind = "web"
previewPath = "/aegis/"
title = "Aegis Security Platform"
version = "1.0.0"
id = "artifacts/aegis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/aegis/" ]
localPort = 25001

[services.development]
run = "pnpm --filter @workspace/aegis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aegis", "run", "build" ]
publicDir = "artifacts/aegis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25001"
BASE_PATH = "/aegis/"
